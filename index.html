<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>로보틱스·자동화 신입 채용 리스트</title>
<style>
  :root{ --bg:#0f1116; --card:#171a21; --line:#262b36; --text:#e6e8ec; --muted:#9aa3b2; --accent:#4f8cff; --chip:#1f2735; --star:#ffcb45; }
  *{box-sizing:border-box;}
  body{margin:0;font-family:"Pretendard","Apple SD Gothic Neo","Malgun Gothic",system-ui,sans-serif;background:var(--bg);color:var(--text);line-height:1.5;}
  header{padding:28px 20px 12px;max-width:1340px;margin:0 auto;position:relative;}
  #userbar{position:absolute;top:20px;right:20px;display:flex;gap:6px;align-items:center;font-size:13px;}
  #userbar input{padding:7px 10px;border-radius:8px;border:1px solid var(--line);background:var(--card);color:var(--text);font-size:13px;width:120px;}
  #userbar button{padding:7px 11px;border-radius:8px;border:1px solid var(--line);background:var(--chip);color:var(--text);cursor:pointer;font-size:12.5px;}
  #userbar button:hover{border-color:var(--accent);}
  #userInfo{color:var(--accent);margin-right:4px;}
  h1{font-size:24px;margin:0 0 6px;}
  .sub{color:var(--muted);font-size:14px;}
  .toolbar{max-width:1340px;margin:14px auto;padding:0 20px;display:flex;gap:10px;flex-wrap:wrap;align-items:center;}
  input[type=search]{flex:1;min-width:220px;padding:10px 14px;border-radius:10px;border:1px solid var(--line);background:var(--card);color:var(--text);font-size:14px;}
  .filters{display:flex;gap:8px;flex-wrap:wrap;}
  .filters button{padding:8px 14px;border-radius:999px;border:1px solid var(--line);background:var(--chip);color:var(--muted);cursor:pointer;font-size:13px;}
  .filters button.active{background:var(--accent);color:#fff;border-color:var(--accent);}
  .filters button[data-f="fav"].active{background:var(--star);color:#1a1a1a;border-color:var(--star);}
  .filters button[data-f="hidden"].active{background:#6b2525;color:#fff;border-color:#8a3030;}
  .export{padding:8px 14px;border-radius:8px;border:1px solid var(--line);background:var(--chip);color:var(--text);cursor:pointer;font-size:13px;}
  select#region,select#revRange,.ddbtn{-webkit-appearance:none;-moz-appearance:none;appearance:none;padding:8px 30px 8px 12px;border-radius:999px;border:1px solid var(--line);background-color:var(--chip);background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='16' height='16' viewBox='0 0 24 24' fill='none' stroke='%239aa3b2' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><polyline points='6 9 12 15 18 9'/></svg>");background-repeat:no-repeat;background-position:right 10px center;color:var(--text);font-size:13px;cursor:pointer;}
  select#region.on,select#revRange.on,.ddbtn.on{background-color:var(--accent);color:#fff;border-color:var(--accent);background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='16' height='16' viewBox='0 0 24 24' fill='none' stroke='%23ffffff' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><polyline points='6 9 12 15 18 9'/></svg>");}
  .dropdown{position:relative;display:inline-block;}
  .ddmenu{position:absolute;z-index:30;top:calc(100% + 4px);left:0;background:var(--card);border:1px solid var(--line);border-radius:10px;padding:6px;min-width:150px;box-shadow:0 8px 24px rgba(0,0,0,.45);}
  .ddmenu label{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:6px;color:var(--text);font-size:13px;cursor:pointer;}
  .ddmenu label:hover{background:var(--chip);}
  .ddmenu input{cursor:pointer;}
  .wrap{max-width:1340px;margin:0 auto;padding:0 20px 60px;overflow-x:auto;}
  table{width:100%;border-collapse:collapse;font-size:13.5px;background:var(--card);border-radius:12px;overflow:hidden;}
  thead th{position:sticky;top:0;background:#1d2230;color:var(--muted);text-align:left;padding:12px;font-weight:600;border-bottom:1px solid var(--line);white-space:nowrap;cursor:default;}
  thead th[data-k]{cursor:pointer;}
  thead th[data-k]:hover{color:var(--text);}
  .sicon{font-size:12px;color:var(--accent);}
  tbody td{padding:12px;border-bottom:1px solid var(--line);vertical-align:top;}
  tbody tr:hover{background:#1b2030;}
  .role{font-weight:700;color:#fff;}
  .cat{display:inline-block;margin:4px 4px 0 0;font-size:11px;padding:2px 8px;border-radius:6px;background:var(--chip);color:var(--accent);}
  .small{color:var(--muted);font-size:12px;}
  .req{color:var(--muted);font-size:12.5px;}
  .pay{color:#5fd08a;font-weight:600;white-space:nowrap;}
  .dday{white-space:nowrap;font-weight:600;}
  .dday.soon{color:#ff7a7a;} .dday.normal{color:#e6e8ec;} .dday.none{color:var(--muted);font-weight:400;}
  a.apply{display:inline-block;padding:7px 12px;border-radius:8px;background:var(--accent);color:#fff;text-decoration:none;font-size:12.5px;white-space:nowrap;}
  a.apply:hover{opacity:.88;}
  .actions{display:flex;flex-direction:row;align-items:center;gap:8px;white-space:nowrap;}
  .starbtn{font-size:18px;cursor:pointer;background:none;border:none;color:#3a4150;line-height:1;padding:0;}
  .starbtn.on{color:var(--star);}
  .hidebtn{font-size:11.5px;cursor:pointer;background:none;border:1px solid var(--line);border-radius:6px;padding:3px 7px;color:#8a93a3;line-height:1.3;}
  .hidebtn:hover{color:#ff7a7a;border-color:#6b2525;}
  .hidebtn.restore{color:#5fd08a;border-color:#2f5f43;}
  .badge-closed{display:inline-block;font-size:10px;padding:1px 6px;border-radius:5px;background:#3a1c1c;color:#ff9a9a;margin-left:6px;}
  tr.closed{opacity:.5;}
  .note{max-width:1340px;margin:8px auto 0;padding:14px 20px;color:var(--muted);font-size:12.5px;background:#14304a33;border:1px solid #25496b;border-radius:10px;}
  .count{color:var(--muted);font-size:13px;margin:6px 0 12px;}
  .err{color:#ffb4b4;background:#3a1c1c;border:1px solid #6b2525;padding:14px;border-radius:10px;margin:16px 0;}
  .src{font-size:11px;color:var(--muted);}
  .pager{display:flex;gap:6px;justify-content:center;flex-wrap:wrap;margin:22px 0 10px;}
  .pager button{min-width:34px;padding:7px 10px;border-radius:8px;border:1px solid var(--line);background:var(--card);color:var(--text);cursor:pointer;font-size:13px;}
  .pager button:hover:not(:disabled){border-color:var(--accent);}
  .pager button.cur{background:var(--accent);color:#fff;border-color:var(--accent);font-weight:700;}
  .pager button:disabled{opacity:.35;cursor:default;}
  /* Lucide 아이콘 */
  .lucide{width:16px;height:16px;vertical-align:-3px;stroke-width:2;display:inline-block;}
  h1 .lucide{width:24px;height:24px;vertical-align:-5px;color:var(--accent);}
  .filters button .lucide{width:14px;height:14px;vertical-align:-2px;}
  .starbtn .lucide{width:18px;height:18px;vertical-align:middle;}
  .starbtn.on .lucide{fill:currentColor;}
  .hidebtn .lucide{width:12px;height:12px;vertical-align:-1px;}
  .sicon .lucide{width:13px;height:13px;vertical-align:-2px;}
  .pager button .lucide{width:14px;height:14px;vertical-align:-2px;}
  .ticon{color:var(--muted);display:flex;align-items:center;}
  .navlink{display:inline-flex;align-items:center;gap:5px;margin-top:10px;color:var(--accent);cursor:pointer;font-size:14px;font-weight:600;text-decoration:none;}
  .navlink:hover{text-decoration:underline;}
  .navlink .lucide{width:16px;height:16px;}
  .detailbtn{display:inline-flex;align-items:center;gap:3px;margin-top:4px;padding:2px 7px;border-radius:6px;border:1px solid var(--line);background:var(--chip);color:var(--accent);cursor:pointer;font-size:11px;}
  .detailbtn:hover{border-color:var(--accent);}
  .detailbtn .lucide{width:12px;height:12px;}
  #researchCards{display:grid;grid-template-columns:repeat(auto-fill,minmax(420px,1fr));gap:14px;margin-top:8px;}
  .rcard{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:16px 18px;}
  .rcard.hl{border-color:var(--accent);box-shadow:0 0 0 2px var(--accent) inset;}
  .rcard h3{margin:0 0 4px;font-size:16px;color:#fff;}
  .rcard .conf{font-size:10px;padding:1px 7px;border-radius:5px;margin-left:6px;vertical-align:2px;}
  .conf.high{background:#13351f;color:#5fd08a;} .conf.medium{background:#2b2a14;color:#e0c34a;} .conf.low{background:#3a1c1c;color:#ff9a9a;}
  .rcard .fld{margin-top:10px;font-size:12.5px;line-height:1.55;}
  .rcard .fld b{color:var(--accent);font-weight:600;display:block;font-size:11.5px;margin-bottom:2px;}
  .rcard .tgt{background:#14304a33;border:1px solid #25496b;border-radius:8px;padding:8px 10px;}
  .rcard details{margin-top:10px;font-size:11.5px;color:var(--muted);}
  .rcard details a{color:var(--accent);display:block;margin:3px 0;word-break:break-all;}
</style>
</head>
<body>
<header>
  <div id="userbar">
    <span id="userInfo" style="display:none;"><i data-lucide="user"></i> <b id="userName"></b></span>
    <input type="text" id="nickInput" placeholder="닉네임 입력" maxlength="32">
    <button id="loginBtn"><i data-lucide="log-in"></i> 로그인</button>
    <button id="logoutBtn" style="display:none;"><i data-lucide="log-out"></i> 로그아웃</button>
  </div>
  <h1><i data-lucide="bot"></i> 로보틱스·자동화 신입 지원 가능 채용 리스트</h1>
  <div class="sub">데이터 소스: <code>jobs.csv</code> + <code>companies.csv</code> (ID 매칭) · 사람인 라이브 스크래핑</div>
  <a class="navlink" href="research.html" target="_blank" rel="noopener">사원수 200명 이상 딥리서치 보기 <i data-lucide="arrow-right"></i></a>
</header>

<div class="note">
  <i data-lucide="star"></i> <b>스크랩(찜)·숨김</b> — 우측 상단에 <b>임의의 닉네임</b>을 입력하고 사용하세요(비밀번호 불필요).
  찜/숨김이 그 닉네임에 저장돼 다른 기기·브라우저에서도 같은 닉네임으로 보면 그대로 나타납니다.
  · 매출액은 DART 기준, 없으면 '알 수 없음'으로 표시됩니다.
</div>

<div id="jobsView">
<div class="toolbar">
  <span class="ticon"><i data-lucide="search"></i></span>
  <input type="search" id="q" placeholder="회사·직무·근무지·조건·출처 검색">
  <div class="filters" id="filters">
    <button class="active" data-f="all">전체</button>
    <button data-f="기획/PM">기획/PM</button>
    <button data-f="R&D">R&D</button>
    <button data-f="필드엔지니어">필드엔지니어</button>
    <button data-f="생산/제조">생산/제조</button>
    <button data-f="영업">영업</button>
    <button data-f="fav"><i data-lucide="star"></i> 찜</button>

  </div>

    <option value="all">매출액 전체</option>
    <option value="0-50">~50억</option>
    <option value="50-300">50~300억</option>
    <option value="300-1000">300~1000억</option>
    <option value="1000-">1000억 이상</option>
    <option value="none">매출 미상</option>
  </select>
  <span id="srcDropdown" class="dropdown" title="채용사이트 필터(복수선택)">
    <button type="button" id="srcBtn" class="ddbtn">채용사이트 전체</button>
    <div class="ddmenu" id="srcMenu" hidden>
      <label><input type="checkbox" value="사람인" checked> 사람인</label>
      <label><input type="checkbox" value="잡코리아" checked> 잡코리아</label>

    </div>

  <label style="color:var(--muted);font-size:13px;display:flex;align-items:center;gap:6px;cursor:pointer;"><input type="checkbox" id="hideClosed" checked> 마감 숨기기</label>
  <button class="export" id="exportFav"><i data-lucide="download"></i> 찜 CSV 내보내기</button>
  <button class="export" id="refresh" title="serve.py 실행 중일 때만 동작"><i data-lucide="refresh-cw"></i> <span id="refreshLabel">갱신</span></button>

<div class="wrap">
  <div class="count" id="count"></div>

  <table id="tbl">
    <thead>
      <tr>
        <th title="스크랩"><i data-lucide="star"></i></th>

        <th data-k="employees">사원수/규모 <span class="sicon"><i data-lucide="chevrons-up-down"></i></span></th>

      </tr>
    </thead>
    <tbody id="rows"></tbody>

<script>
  // [개인화 서버] 닉네임별 찜/숨김을 기기 간 동기화하는 Cloudflare Worker.
  // 비우면 같은 출처(serve.py)를 사용. (server/README.md 참고)
  window.RJS_API_BASE = 'https://robotics-job-userdata.woody-myung.workers.dev';
</script>
<script src="https://unpkg.com/lucide@latest"></script>
<script>
let DATA = [], COMPANIES = {}, filter = 'all', region = 'all', revRange = 'all', sortK = null, sortAsc = true, hideClosed = true;
let sources = new Set(['사람인','잡코리아','잡플래닛']);  // 채용사이트 필터(복수선택, 기본 전체)
let RESEARCH = {}, RESEARCH_LIST = [];   // 기업 심층 리서치 (회사명 기준)

// 매출액 문자열("273억 1백만원(2025.12.31)") -> 억 단위 숫자. 없으면 null.
function revNum(d){
  const s=(COMPANIES[d.company_id]||{}).revenue||d.revenue||'';
  if(!s) return null;
  let eok=0; const jo=s.match(/([\d,.]+)\s*조/), e=s.match(/([\d,.]+)\s*억/);
  if(jo) eok+=parseFloat(jo[1].replace(/,/g,''))*10000;
  if(e)  eok+=parseFloat(e[1].replace(/,/g,''));
  if(!jo&&!e){ const m=s.match(/([\d,.]+)\s*만/); if(m) eok=parseFloat(m[1].replace(/,/g,''))/10000; }
  return eok||null;
}
// 사원수("247명") -> 숫자. 없으면 null.
function empNum(d){
  const m=((COMPANIES[d.company_id]||{}).employees||'').match(/([\d,]+)\s*명/);
  return m?parseInt(m[1].replace(/,/g,'')):null;
}
// 매출액 범위 필터 (억 단위)
function revInRange(d){
  if(revRange==='all') return true;
  const v=revNum(d);
  if(revRange==='none') return v==null;
  if(v==null) return false;
  const [lo,hi]=revRange.split('-');
  if(lo!=='' && v<+lo) return false;
  if(hi!=='' && v>=+hi) return false;
  return true;
}
let page = 1;                 // 현재 페이지(1-based)
const PAGE_SIZE = 20;         // 페이지당 공고 수
const PAGE_WINDOW = 10;       // 페이지 네비게이터에 한 번에 보이는 번호 수
function goPage(p){ page = p; render(); window.scrollTo({top:0,behavior:'smooth'}); }
function resetPage(){ page = 1; }

// 시/도 표시 순서 (근무지 앞 2글자 코드)
const SIDO = ['서울','경기','인천','부산','대구','광주','대전','울산','세종',
              '강원','충북','충남','전북','전남','경북','경남','제주'];
function regionOf(loc){
  if(!loc) return '기타';
  const p = loc.slice(0,2);
  if(SIDO.includes(p)) return p;
  if(loc.startsWith('전국')) return '전국';
  return '해외/기타';  // 미국·일본 등
}
// 개인화 서버 주소: 비우면 같은 출처(serve.py). GitHub Pages 등에선 아래를 배포한 서버 URL로 설정.
const API_BASE = (window.RJS_API_BASE || localStorage.getItem('rjs_api') || '').replace(/\/$/,'');
let USER = localStorage.getItem('rjs_user') || '';
function favKey(){ return USER ? 'fav_'+USER : 'fav_jobs'; }
function hideKey(){ return USER ? 'hidden_'+USER : 'hidden_jobs'; }
let FAV = new Set(JSON.parse(localStorage.getItem(favKey()) || '[]'));
let HIDE = new Set(JSON.parse(localStorage.getItem(hideKey()) || '[]'));

// 찜/숨김 저장: 로컬 캐시 + (로그인 시) 서버 동기화
function saveState(){
  localStorage.setItem(favKey(), JSON.stringify([...FAV]));
  localStorage.setItem(hideKey(), JSON.stringify([...HIDE]));
  if(USER){
    fetch(API_BASE+'/userdata?user='+encodeURIComponent(USER), {
      method:'POST', headers:{'Content-Type':'application/json'},
      body:JSON.stringify({fav:[...FAV], hidden:[...HIDE]})
    }).catch(()=>{});  // 정적 호스팅(서버 없음)이면 로컬 캐시만 유지
  }
}
// 닉네임 적용: 서버에서 내역 로드(실패 시 로컬 캐시 폴백) 후 렌더
async function applyUser(user){
  USER = user || '';
  if(USER) localStorage.setItem('rjs_user', USER); else localStorage.removeItem('rjs_user');
  FAV = new Set(JSON.parse(localStorage.getItem(favKey()) || '[]'));
  HIDE = new Set(JSON.parse(localStorage.getItem(hideKey()) || '[]'));
  if(USER){
    try{
      const d = await (await fetch(API_BASE+'/userdata?user='+encodeURIComponent(USER))).json();
      FAV = new Set(d.fav || []); HIDE = new Set(d.hidden || []);
      localStorage.setItem(favKey(), JSON.stringify([...FAV]));
      localStorage.setItem(hideKey(), JSON.stringify([...HIDE]));
    }catch(e){ /* 서버 없음: 로컬 캐시 사용 */ }
  }
  updateUserUI(); resetPage(); render();
}
function updateUserUI(){
  const info=document.getElementById('userInfo'), nm=document.getElementById('userName');
  const inp=document.getElementById('nickInput'), lin=document.getElementById('loginBtn'), lout=document.getElementById('logoutBtn');
  if(USER){ info.style.display=''; nm.textContent=USER; inp.style.display='none'; lin.style.display='none'; lout.style.display=''; }
  else{ info.style.display='none'; inp.style.display=''; lin.style.display=''; lout.style.display='none'; }
  if(window.lucide) lucide.createIcons();
}
const rows = document.getElementById('rows');
const q = document.getElementById('q');
const countEl = document.getElementById('count');
const errbox = document.getElementById('errbox');

// --- CSV 파서 (따옴표·콤마·줄바꿈 처리) ---
function parseCSV(text){
  const out=[]; let row=[],field='',i=0,inQ=false;
  text=text.replace(/^﻿/,'');
  while(i<text.length){
    const c=text[i];
    if(inQ){ if(c==='"'&&text[i+1]==='"'){field+='"';i+=2;continue;} if(c==='"'){inQ=false;i++;continue;} field+=c;i++;continue; }
    if(c==='"'){inQ=true;i++;continue;}
    if(c===','){row.push(field);field='';i++;continue;}
    if(c==='\r'){i++;continue;}
    if(c==='\n'){row.push(field);out.push(row);row=[];field='';i++;continue;}
    field+=c;i++;
  }
  if(field.length||row.length){row.push(field);out.push(row);}
  const header=out.shift();
  return out.filter(r=>r.length>1&&r.some(x=>x.trim())).map(r=>{
    const o={}; header.forEach((h,idx)=>o[h.trim()]=(r[idx]||'').trim()); return o;
  });
}
function esc(s){ return (s||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])); }
function csvCell(s){ s=(s==null?'':String(s)); return /[",\n]/.test(s)?'"'+s.replace(/"/g,'""')+'"':s; }
function keyOf(d){ return d.url || (d.company+'|'+d.role); }

// 마감일 -> 표시/긴급도. "06/20(토)" 형태에서 임박 여부 판단.
function ddInfo(raw){
  if(!raw) return {txt:'상시/미정', cls:'none'};
  if(/내일|오늘|D-?[0-3]\b/.test(raw)) return {txt:raw, cls:'soon'};
  const m = raw.match(/(\d{1,2})\/(\d{1,2})/);
  if(m){
    const now=new Date(), mo=+m[1]-1, da=+m[2];
    let due=new Date(now.getFullYear(), mo, da);
    if(due < now-864e5) due=new Date(now.getFullYear()+1, mo, da); // 연말->연초 보정
    const days=Math.ceil((due-now)/864e5);
    return {txt: raw + (days>=0?` (D-${days})`:''), cls: days<=7?'soon':'normal'};
  }
  return {txt:raw, cls:'normal'};
}

// 마감일 -> 남은 일수(숫자). 미정/상시는 맨 뒤로 가도록 큰 값.
function ddDays(raw){
  if(!raw) return 1e9;
  if(/오늘/.test(raw)) return 0;
  if(/내일/.test(raw)) return 1;
  const m=raw.match(/(\d{1,2})\/(\d{1,2})/);
  if(m){
    const now=new Date(), mo=+m[1]-1, da=+m[2];
    let due=new Date(now.getFullYear(),mo,da);
    if(due<now-864e5) due=new Date(now.getFullYear()+1,mo,da);
    return Math.ceil((due-now)/864e5);
  }
  return 1e9;
}
function updateSortIcon(){
  document.querySelectorAll('thead th[data-k]').forEach(th=>{
    const ic=th.querySelector('.sicon'); if(!ic) return;
    const name = sortK===th.dataset.k ? (sortAsc?'chevron-up':'chevron-down') : 'chevrons-up-down';
    ic.innerHTML = `<i data-lucide="${name}"></i>`;
  });
}

function visible(){
  const term=q.value.trim().toLowerCase();
  let list=DATA.filter(d=>{
    const k=keyOf(d), hidden=HIDE.has(k);
    // 숨김 모아보기일 때만 숨긴 항목 노출, 그 외에는 숨긴 항목 제외
    if(filter==='hidden') { if(!hidden) return false; }
    else if(hidden) return false;
    if(hideClosed && d.status==='마감' && filter!=='fav') return false;
    const cats=(d.category||'').split('|').filter(Boolean);
    const okF = (filter==='all'||filter==='hidden') ? true : filter==='fav' ? FAV.has(k) : cats.includes(filter);
    const okR = region==='all' || regionOf(d.location)===region;
    const okRev = revInRange(d);
    const okS = sources.size===0 || sources.has(d.source);
    const blob=Object.values(d).join(' ').toLowerCase();
    return okF && okR && okRev && okS && (term===''||blob.includes(term));
  });
  const keyFns={deadline:d=>ddDays(d.deadline), revenue:revNum, employees:empNum};
  if(sortK && keyFns[sortK]){
    const f=keyFns[sortK];
    list=[...list].sort((a,b)=>{
      let va=f(a), vb=f(b);
      const na=(va==null), nb=(vb==null);
      if(na&&nb) return 0; if(na) return 1; if(nb) return -1;  // 값 없으면 항상 뒤로
      return (va-vb)*(sortAsc?1:-1);
    });
  }
  return list;
}

function renderPager(total){
  const pager=document.getElementById('pager');
  const pages=Math.max(1, Math.ceil(total/PAGE_SIZE));
  if(page>pages) page=pages;
  if(pages<=1){ pager.innerHTML=''; return; }
  const half=Math.floor(PAGE_WINDOW/2);
  let start=Math.max(1, page-half), end=Math.min(pages, start+PAGE_WINDOW-1);
  start=Math.max(1, end-PAGE_WINDOW+1);
  let h=`<button ${page===1?'disabled':''} data-p="1" title="처음"><i data-lucide="chevrons-left"></i></button>`
      + `<button ${page===1?'disabled':''} data-p="${page-1}" title="이전"><i data-lucide="chevron-left"></i></button>`;
  for(let i=start;i<=end;i++) h+=`<button class="${i===page?'cur':''}" data-p="${i}">${i}</button>`;
  h+=`<button ${page===pages?'disabled':''} data-p="${page+1}" title="다음"><i data-lucide="chevron-right"></i></button>`
     + `<button ${page===pages?'disabled':''} data-p="${pages}" title="마지막"><i data-lucide="chevrons-right"></i></button>`;
  pager.innerHTML=h;
}

function render(){
  const list=visible();
  const startIdx=(page-1)*PAGE_SIZE;
  const pageList=list.slice(startIdx, startIdx+PAGE_SIZE);
  rows.innerHTML=pageList.map(d=>{
    const k=keyOf(d), on=FAV.has(k), hidden=HIDE.has(k), dd=ddInfo(d.deadline);
    const closed = d.status==='마감';
    const co = COMPANIES[d.company_id] || {};
    const rev = co.revenue || d.revenue || '';
    const emp = co.employees || '', scale = co.biz_type || '';
    const empCell = emp ? (esc(emp)+(scale?'<br><span class="src">'+esc(scale)+'</span>':''))
                        : (scale ? esc(scale) : '알 수 없음');
    return `<tr class="${closed?'closed':''}">
      <td>
        <div class="actions">
          <button class="starbtn ${on?'on':''}" data-act="fav" data-k="${esc(k)}" title="스크랩"><i data-lucide="star"></i></button>
          <button class="hidebtn ${hidden?'restore':''}" data-act="hide" data-k="${esc(k)}" title="${hidden?'숨김 해제':'숨기기'}">${hidden?'<i data-lucide="rotate-ccw"></i> 복구':'<i data-lucide="x"></i> 숨김'}</button>
        </div>
      </td>
      <td>${esc(d.company)}${closed?'<span class="badge-closed">마감</span>':''}<br>
          <span class="src">${co.industry?esc(co.industry)+' · ':''}${esc(d.source)}</span>
          ${RESEARCH[d.company]?`<br><a class="detailbtn" href="research.html?company=${encodeURIComponent(d.company)}" target="_blank" rel="noopener">자세히 <i data-lucide="arrow-right"></i></a>`:''}</td>
      <td><span class="role">${esc(d.role)}</span><br>${(d.category||'').split('|').filter(Boolean).map(c=>`<span class="cat">${esc(c)}</span>`).join(' ')}</td>
      <td class="small">${esc(d.description)||'—'}</td>
      <td class="req">${esc(d.requirements)||'—'}</td>
      <td class="small">${esc(d.location)||'—'}</td>
      <td class="dday ${dd.cls}">${esc(dd.txt)}</td>
      <td class="small">${esc(rev)||'알 수 없음'}</td>
      <td class="small">${empCell}</td>
      <td>${d.url?`<a class="apply" href="${esc(d.url)}" target="_blank" rel="noopener">지원 →</a>`:'—'}</td>
    </tr>`;}).join('');
  const from=list.length?startIdx+1:0, to=Math.min(startIdx+PAGE_SIZE, list.length);
  countEl.textContent=`${from}–${to} / 총 ${list.length}건 (전체 ${DATA.length}건 · 찜 ${FAV.size}건 · 숨김 ${HIDE.size}건)`;
  renderPager(list.length);
  updateSortIcon();
  if(window.lucide) lucide.createIcons();
}

function buildRegionOptions(){
  const counts={};
  DATA.forEach(d=>{ const r=regionOf(d.location); counts[r]=(counts[r]||0)+1; });
  const order=[...SIDO,'전국','해외/기타','기타'].filter(r=>counts[r]);
  const sel=document.getElementById('region');
  sel.innerHTML=`<option value="all">근무지 전체 (${DATA.length})</option>`
    + order.map(r=>`<option value="${esc(r)}">${esc(r)} (${counts[r]})</option>`).join('');
}

function load(text){
  try{ DATA=parseCSV(text); errbox.innerHTML=''; resetPage(); buildRegionOptions(); render(); }
  catch(e){ errbox.innerHTML=`<div class="err">CSV 파싱 오류: ${esc(e.message)}</div>`; }
}

// 별/숨김 토글 (이벤트 위임)
rows.addEventListener('click', e=>{
  const b=e.target.closest('.starbtn,.hidebtn'); if(!b) return;
  const k=b.dataset.k;
  if(b.dataset.act==='fav'){
    if(FAV.has(k)) FAV.delete(k); else FAV.add(k);
  }else{
    if(HIDE.has(k)) HIDE.delete(k); else HIDE.add(k);
  }
  saveState();
  render();
});
// 로그인 / 로그아웃 (닉네임 기반 개인화)
document.getElementById('loginBtn').addEventListener('click', ()=>{
  const n=document.getElementById('nickInput').value.trim().replace(/[^0-9A-Za-z가-힣_\-]/g,'').slice(0,32);
  if(!n){ alert('닉네임을 입력하세요.'); return; }
  applyUser(n);
});
document.getElementById('nickInput').addEventListener('keydown', e=>{ if(e.key==='Enter') document.getElementById('loginBtn').click(); });
document.getElementById('logoutBtn').addEventListener('click', ()=>applyUser(''));
// 찜 CSV 내보내기
document.getElementById('exportFav').addEventListener('click', ()=>{
  const cols=['company','role','category','description','requirements','location','deadline','revenue','status','source','url'];
  const favs=DATA.filter(d=>FAV.has(keyOf(d)));
  if(!favs.length){ alert('찜한 공고가 없습니다.'); return; }
  const valOf=(d,c)=> c==='revenue' ? ((COMPANIES[d.company_id]||{}).revenue||d.revenue||'') : d[c];
  const csv=[cols.join(',')].concat(favs.map(d=>cols.map(c=>csvCell(valOf(d,c))).join(','))).join('\n');
  const blob=new Blob(['﻿'+csv],{type:'text/csv;charset=utf-8'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='찜한_공고.csv'; a.click();
});
// 갱신 버튼 — serve.py의 /scrape 호출 후 CSV 다시 로드 (아이콘은 두고 라벨만 변경)
document.getElementById('refresh').addEventListener('click', async ()=>{
  const btn=document.getElementById('refresh'), lab=document.getElementById('refreshLabel');
  btn.disabled=true; lab.textContent='스크래핑 중...';
  try{
    const r=await fetch('/scrape',{method:'POST'});
    const j=await r.json();
    if(!j.ok) throw new Error(j.log||'실패');
    await loadAll(true);
    lab.textContent='갱신 완료';
  }catch(e){
    errbox.innerHTML=`<div class="err">갱신 실패: ${esc(e.message)}<br>※ 이 버튼은 <code>python3 serve.py</code>로 띄웠을 때만 동작합니다.</div>`;
    lab.textContent='갱신';
  }finally{
    btn.disabled=false; setTimeout(()=>{lab.textContent='갱신';},2500);
  }
});
// 페이지 네비게이터
document.getElementById('pager').addEventListener('click', e=>{
  const b=e.target.closest('button[data-p]'); if(!b||b.disabled) return;
  goPage(+b.dataset.p);
});
// 정렬 / 검색 / 필터 (변경 시 1페이지로)
document.querySelectorAll('thead th[data-k]').forEach(th=>th.addEventListener('click',()=>{
  const k=th.dataset.k; if(sortK===k) sortAsc=!sortAsc; else {sortK=k;sortAsc=true;} resetPage(); render();
}));
q.addEventListener('input', ()=>{ resetPage(); render(); });
document.getElementById('hideClosed').addEventListener('change', e=>{ hideClosed=e.target.checked; resetPage(); render(); });
document.getElementById('region').addEventListener('change', e=>{
  region=e.target.value;
  e.target.classList.toggle('on', region!=='all');
  resetPage(); render();
});
document.getElementById('revRange').addEventListener('change', e=>{
  revRange=e.target.value;
  e.target.classList.toggle('on', revRange!=='all');
  resetPage(); render();
});
(function(){
  const dd=document.getElementById('srcDropdown'), btn=document.getElementById('srcBtn'), menu=document.getElementById('srcMenu');
  const boxes=[...menu.querySelectorAll('input[type=checkbox]')];
  function sync(){
    sources=new Set(boxes.filter(b=>b.checked).map(b=>b.value));
    const all=boxes.every(b=>b.checked);
    btn.textContent=all?'채용사이트 전체':`채용사이트 ${sources.size}개`;
    btn.classList.toggle('on', !all);
  }
  btn.addEventListener('click', e=>{ e.stopPropagation(); menu.hidden=!menu.hidden; });
  menu.addEventListener('click', e=>e.stopPropagation());
  boxes.forEach(b=>b.addEventListener('change', ()=>{ sync(); resetPage(); render(); }));
  document.addEventListener('click', ()=>{ menu.hidden=true; });
})();
document.querySelectorAll('#filters button').forEach(b=>b.addEventListener('click',()=>{
  document.querySelectorAll('#filters button').forEach(x=>x.classList.remove('active'));
  b.classList.add('active'); filter=b.dataset.f; resetPage(); render();
}));
// ===== 기업 심층 리서치 (별도 페이지) =====
function loadResearch(text){
  RESEARCH={}; RESEARCH_LIST=[];
  try{
    RESEARCH_LIST = parseCSV(text);
    RESEARCH_LIST.forEach(r=>{ if(r.name) RESEARCH[r.name]=r; });
  }catch(e){}
}
// (딥리서치는 research.html 별도 페이지에서 렌더 — 공고 표의 '자세히' 링크가 새 탭으로 연결)

// companies.csv -> COMPANIES 맵 (id 기준). 매출액 등 회사정보 매칭용.
function loadCompanies(text){
  COMPANIES={};
  try{ parseCSV(text).forEach(c=>{ if(c.id) COMPANIES[c.id]=c; }); }catch(e){}
}
async function loadAll(bust){
  const qs = bust?('?'+Date.now()):'';
  // 회사정보·리서치 먼저(있으면) → 직무 로드 시 join에 사용
  try{ loadCompanies(await (await fetch('companies.csv'+qs)).text()); }catch(e){}
  try{ loadResearch(await (await fetch('companies_deepresearch.csv'+qs)).text()); }catch(e){}
  const jobs=await (await fetch('jobs.csv'+qs)).text();
  load(jobs);  // load 내부에서 render
}
loadAll(false).then(()=>{
  // research.html → '이 회사 채용 공고 보기' 링크: ?company= 로 해당 회사 검색
  const c=new URLSearchParams(location.search).get('company');
  if(c) document.getElementById('q').value=c;
  if(USER) applyUser(USER);          // applyUser가 q.value 반영해 render
  else if(c){ resetPage(); render(); }
}).catch(()=>{
  errbox.innerHTML=`<div class="err">데이터 자동 로드 실패. <code>python3 serve.py</code>로 접속하거나 GitHub Pages에서 여세요.</div>`;
});
updateUserUI();
if(window.lucide) lucide.createIcons();  // 헤더·툴바 등 정적 아이콘 즉시 렌더
</script>
